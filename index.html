<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Songapp</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>Songapp</h1>
      </div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search songs..." />
      </div>
      <div class="song-count" id="songCount">0 songs</div>
      <div class="playlist" id="playlist"></div>
    </aside>

    <main class="player">
      <div class="album-art" id="albumArt">
        <div class="album-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/>
            <path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
          </svg>
        </div>
      </div>

      <div class="song-info">
        <h2 class="song-title" id="songTitle">Select a song</h2>
        <p class="song-artist" id="songArtist">Choose from the playlist</p>
      </div>

      <div class="progress-container">
        <span class="time" id="currentTime">0:00</span>
        <div class="progress-track" id="progressTrack">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="time" id="totalTime">0:00</span>
      </div>

      <div class="controls">
        <button id="btnPrev" aria-label="Previous">⏮</button>
        <button id="btnPlay" aria-label="Play/pause">▶</button>
        <button id="btnNext" aria-label="Next">⏭</button>
      </div>

      <div class="volume-row">
        <span id="volumeIcon">🔊</span>
        <div class="volume-track" id="volumeTrack">
          <div class="volume-fill" id="volumeFill"></div>
        </div>
        <span class="volume-pct" id="volumePct">100%</span>
      </div>
    </main>
  </div>

  <audio id="audioPlayer" preload="auto"></audio>
  <script src="app.js"></script>
</body>
</html>
